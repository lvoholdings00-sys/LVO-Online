<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LVO</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Share Tech Mono', monospace;
      cursor: crosshair;
    }

    #vanta-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: 320px;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 40px 32px 28px;
      position: relative;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: -3px; left: -3px;
      width: 22px; height: 22px;
      border-top: 1px solid rgba(255,255,255,0.3);
      border-left: 1px solid rgba(255,255,255,0.3);
    }
    .panel::after {
      content: '';
      position: absolute;
      bottom: -3px; right: -3px;
      width: 22px; height: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      border-right: 1px solid rgba(255,255,255,0.3);
    }

    .sigil-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 1s 0.9s forwards;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.85);
      text-align: center;
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeIn 0.8s 1s forwards;
    }

    .subtitle {
      font-size: 0.52rem;
      color: rgba(255,255,255,0.2);
      text-align: center;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeIn 0.8s 1.1s forwards;
    }

    .rule {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeIn 0.8s 1.15s forwards;
    }
    .rule-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12));
    }
    .rule-line.r { background: linear-gradient(to left, transparent, rgba(255,255,255,0.12)); }
    .rule-diamond {
      width: 4px; height: 4px;
      background: rgba(255,255,255,0.2);
      transform: rotate(45deg);
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: none;
      color: rgba(255,255,255,0.28);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.26em;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.25s, letter-spacing 0.25s;
      opacity: 0;
      position: relative;
    }

    .nav-btn:last-child { border-bottom: none; }
    .nav-btn:hover { color: rgba(255,255,255,0.8); letter-spacing: 0.3em; }

    .nav-btn .glyph {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.15);
      transition: color 0.25s;
      flex-shrink: 0;
      width: 10px;
      text-align: center;
    }
    .nav-btn:hover .glyph { color: rgba(255,255,255,0.5); }
    .nav-btn .lbl { flex: 1; }
    .nav-btn .arr {
      font-size: 0.5rem;
      color: rgba(255,255,255,0.1);
      transition: color 0.25s, transform 0.25s;
      letter-spacing: 0;
    }
    .nav-btn:hover .arr { color: rgba(255,255,255,0.4); transform: translateX(3px); }

    .nav-btn.dashboard { color: rgba(255,255,255,0.55); }
    .nav-btn.dashboard:hover { color: rgba(255,255,255,0.95); }

    .nav-btn:nth-child(1) { animation: fadeIn 0.5s 1.3s forwards; }
    .nav-btn:nth-child(2) { animation: fadeIn 0.5s 1.42s forwards; }
    .nav-btn:nth-child(3) { animation: fadeIn 0.5s 1.54s forwards; }
    .nav-btn:nth-child(4) { animation: fadeIn 0.5s 1.66s forwards; }

    .panel-footer {
      margin-top: 24px;
      font-size: 0.45rem;
      color: rgba(255,255,255,0.1);
      letter-spacing: 0.18em;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s 1.8s forwards;
    }

    #audio-btn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 20;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.35);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      padding: 7px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      opacity: 0;
      animation: fadeIn 0.6s 2.2s forwards;
    }
    #audio-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
    #audio-btn.playing { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.18); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { to { opacity: 1; } }

    @media (max-width: 420px) {
      .panel { width: 88vw; padding: 32px 22px 24px; }
    }
  </style>
</head>
<body>

  <div id="vanta-bg"></div>

  <div id="app">
    <div class="panel">

      <div class="sigil-wrap">
        <svg width="90" height="66" viewBox="0 0 90 66" fill="none">
          <polygon points="45,2 80,21 80,45 45,64 10,45 10,21" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
          <polygon points="45,10 68,23 68,43 45,56 22,43 22,23" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
          <line x1="45" y1="2" x2="45" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>
          <line x1="10" y1="33" x2="80" y2="33" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
          <line x1="10" y1="21" x2="80" y2="45" stroke="rgba(255,255,255,0.05)" stroke-width="0.4"/>
          <line x1="10" y1="45" x2="80" y2="21" stroke="rgba(255,255,255,0.05)" stroke-width="0.4"/>
          <line x1="45" y1="14" x2="30" y2="6" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>
          <line x1="30" y1="6" x2="27" y2="11" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <line x1="45" y1="14" x2="60" y2="6" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>
          <line x1="60" y1="6" x2="63" y2="11" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <line x1="45" y1="50" x2="34" y2="62" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
          <line x1="45" y1="50" x2="56" y2="62" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
          <line x1="10" y1="33" x2="3" y2="28" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <line x1="10" y1="33" x2="3" y2="38" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <line x1="80" y1="33" x2="87" y2="28" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <line x1="80" y1="33" x2="87" y2="38" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <ellipse cx="45" cy="33" rx="6" ry="4" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>
          <circle cx="45" cy="33" r="1.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
          <circle cx="45" cy="33" r="0.7" fill="rgba(255,255,255,0.4)"/>
        </svg>
      </div>

      <h1 class="title">LVO</h1>
      <p class="subtitle">classified access terminal</p>

      <div class="rule">
        <div class="rule-line"></div>
        <div class="rule-diamond"></div>
        <div class="rule-line r"></div>
      </div>

      <nav class="nav-menu">
        <a href="https://login.lvo-cloud.cloud" class="nav-btn dashboard">
          <span class="glyph">&#9670;</span>
          <span class="lbl">DASHBOARD</span>
          <span class="arr">&#8212;&#8594;</span>
        </a>
        <a href="#" class="nav-btn">
          <span class="glyph">&#9671;</span>
          <span class="lbl">STATUS</span>
          <span class="arr">&#8594;</span>
        </a>
        <a href="#" class="nav-btn">
          <span class="glyph">&#9671;</span>
          <span class="lbl">DOCS</span>
          <span class="arr">&#8594;</span>
        </a>
        <a href="#" class="nav-btn">
          <span class="glyph">&#9671;</span>
          <span class="lbl">SUPPORT</span>
          <span class="arr">&#8594;</span>
        </a>
      </nav>

      <div class="panel-footer">&copy; LVO Holdings &mdash; AUTHORIZED ACCESS ONLY</div>
    </div>
  </div>

  <audio id="ambient" src="assets/Project18.mp3" loop preload="auto"></audio>
  <button id="audio-btn">&#9711; SOUND ON</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.clouds2.min.js"></script>
  <script>
    VANTA.CLOUDS2({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200,
      minWidth: 200,
      scale: 1.0,
      texturePath: "assets/noise.png",
      skyColor: 0x0a1628,
      cloudColor: 0xaab8ff,
      cloudShadowColor: 0x000000,
      lightColor: 0xe8eeff,
      speed: 0.9
    });

    var audio = document.getElementById('ambient');
    var btn = document.getElementById('audio-btn');
    var playing = false;

    audio.volume = 0.45;

    btn.addEventListener('click', function() {
      if (!playing) {
        audio.play().then(function() {
          playing = true;
          btn.textContent = '\u25CE SOUND OFF';
          btn.classList.add('playing');
        }).catch(function() {});
      } else {
        audio.pause();
        playing = false;
        btn.textContent = '\u25CE SOUND ON';
        btn.classList.remove('playing');
      }
    });

    document.addEventListener('click', function() {
      if (!playing && audio.paused) {
        audio.play().then(function() {
          playing = true;
          btn.textContent = '\u25CE SOUND OFF';
          btn.classList.add('playing');
        }).catch(function() {});
      }
    }, { once: true });
  </script>

</body>
</html>
