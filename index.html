<style>
:root {
  --black: #0a0a0a;
  --surface: #111111;
  --card: #161616;
  --card-hover: #1c1c1c;
  --border: #2a2a2a;
  --border-gold: #b8953f44;
  --gold: #b8953f;
  --gold-light: #d4a853;
  --gold-dim: #7a5f1a;
  --gold-glow: #b8953f22;
  --text: #e8e6e0;
  --text-dim: #9a9690;
  --text-muted: #5a5650;
  --red: #8b2020;
  --red-light: #c0392b;
  --amber: #8b6020;
  --green-dim: #1a3a2a;
  --green: #2d6a4a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ─── LOADING / AUTH GUARD SCREEN ─── */
#guard-screen {
  position: fixed;
  inset: 0;
  background: var(--black);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 800;
  gap: 16px;
  transition: opacity 0.5s ease;
}

#guard-screen.fade-out { opacity: 0; pointer-events: none; }

.guard-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 300;
  letter-spacing: 0.4em;
  color: var(--gold);
}

.guard-hint {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
}

.guard-spinner {
  width: 24px;
  height: 24px;
  border: 1px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── APP SHELL ─── */
#app { display: none; height: 100vh; overflow: hidden; }
#app.visible { display: flex; animation: fadeIn 0.5s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ─── SIDEBAR ─── */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}

.sidebar-logo-sub {
  font-size: 8px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  line-height: 1.4;
}

.sidebar-nav { flex: 1; padding: 12px 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  border-left: 2px solid transparent;
}

.nav-item:hover { background: var(--gold-glow); }
.nav-item.active { background: var(--gold-glow); border-left-color: var(--gold); }

.nav-icon {
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.nav-item.active .nav-icon, .nav-item:hover .nav-icon { color: var(--gold); }

.nav-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; }
.nav-sub { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
.nav-item.active .nav-label, .nav-item:hover .nav-label { color: var(--text); }

.sidebar-bottom {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.auth-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
}

.auth-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

#clerk-user-btn { display: flex; align-items: center; }

/* ─── MAIN CONTENT ─── */
#main {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  background: var(--black);
}

.page { display: none; padding: 40px 48px; animation: pageIn 0.3s ease; }
.page.active { display: block; }

@keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── PAGE HEADER ─── */
.page-header { margin-bottom: 32px; }

.page-title {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 6px;
}

.page-title-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.02em;
}

.page-title-tag {
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--gold);
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}

.page-dba {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.page-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
  max-width: 680px;
  font-family: 'DM Mono', monospace;
}

/* ─── REQUEST BAR ─── */
.request-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 1px solid var(--border-gold);
}

.request-bar input, .request-bar select {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
  transition: border-color 0.2s;
}

.request-bar input { flex: 1; }
.request-bar input::placeholder { color: var(--text-muted); }
.request-bar input:focus, .request-bar select:focus { border-bottom-color: var(--gold); }
.request-bar select { color: var(--text-dim); min-width: 180px; background: var(--card); }
.request-bar select option { background: var(--surface); }

/* ─── KPI GRID ─── */
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.kpi-grid-4 { grid-template-columns: repeat(4, 1fr); }

.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 24px;
  transition: border-color 0.2s, background 0.2s;
}

.kpi-card:hover { border-color: var(--border-gold); background: var(--card-hover); }

.kpi-label {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.kpi-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}

.kpi-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; }
.kpi-sub.gold { color: var(--gold); }

/* ─── SECTION ─── */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 24px;
  margin-bottom: 20px;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 20px;
  letter-spacing: 0.05em;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

/* ─── TABLE ─── */
.data-table { width: 100%; border-collapse: collapse; }

.data-table th {
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 0 16px 12px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.data-table td {
  padding: 14px 16px 14px 0;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
}

.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { color: var(--text); }
.data-table .gold-link { color: var(--gold); cursor: pointer; }

/* ─── BADGES ─── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border: 1px solid;
  border-radius: 0;
}

.badge-active { color: var(--gold); border-color: var(--gold-dim); background: #b8953f0a; }
.badge-pending { color: #c8a050; border-color: #8b6020; background: #8b60200a; }
.badge-development { color: var(--text-muted); border-color: var(--border); background: transparent; }
.badge-complete, .badge-completed { color: #6aaa80; border-color: #2d6a4a; background: #2d6a4a0a; }
.badge-blocked, .badge-alert, .badge-overdue { color: #e05555; border-color: var(--red); background: #8b20200a; }
.badge-secured { color: #6aaa80; border-color: #2d6a4a; background: #2d6a4a0a; }
.badge-gold { color: var(--gold-light); border-color: var(--gold-dim); }
.badge-silver { color: #a0a0b0; border-color: #606070; }
.badge-bronze { color: #c09060; border-color: #7a5030; }
.badge-submitted { color: #7090c0; border-color: #304060; background: #3040600a; }
.badge-review { color: #c0a020; border-color: #806800; background: #8068000a; }

/* ─── BUTTONS ─── */
.btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 9px 20px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.btn-gold { background: var(--gold); color: var(--black); font-weight: 500; }
.btn-gold:hover { background: var(--gold-light); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm { padding: 5px 12px; font-size: 9px; }
.btn-danger { background: transparent; border: 1px solid var(--red); color: #e05555; }
.btn-danger:hover { background: var(--red); color: var(--text); }

/* ─── TABS ─── */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }

.tab {
  padding: 10px 20px;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  margin-bottom: -1px;
}

.tab:hover { color: var(--text-dim); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ─── TWO COL ─── */
.two-col { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }

/* ─── ACTIVITY FEED ─── */
.activity-feed { display: flex; flex-direction: column; gap: 0; }

.activity-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.activity-item:last-child { border-bottom: none; }
.activity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold-dim); margin-top: 4px; flex-shrink: 0; }
.activity-dot.red { background: var(--red-light); }
.activity-dot.green { background: var(--green); }
.activity-time { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; white-space: nowrap; }
.activity-text { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* ─── PROGRESS BAR ─── */
.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-bar { flex: 1; height: 2px; background: var(--border); }
.progress-fill { height: 100%; background: var(--gold); transition: width 0.3s; }
.progress-label { font-size: 10px; color: var(--gold); min-width: 36px; text-align: right; }

/* ─── STATUS SELECT ─── */
.status-select {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  cursor: pointer;
  outline: none;
  letter-spacing: 0.1em;
}
.status-select:focus { border-color: var(--gold); }
.status-select option { background: var(--surface); }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: #0a0a0acc;
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-gold);
  width: 520px;
  max-width: 90vw;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  animation: modalIn 0.25s ease;
}

@keyframes modalIn { from { opacity: 0; transform: scale(0.97) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.05em;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  padding: 0;
  line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--text); }

.form-group { margin-bottom: 18px; }

.form-label {
  display: block;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--card);
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus { border-bottom-color: var(--gold); }
.form-input::placeholder { color: var(--text-muted); }
.form-select option { background: var(--surface); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* ─── TOP BAR ─── */
.top-bar {
  position: sticky;
  top: 0;
  background: var(--black);
  border-bottom: 1px solid var(--border);
  padding: 14px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}

.top-bar-left { font-size: 10px; letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase; }
.top-bar-right { display: flex; align-items: center; gap: 16px; }

.notif-btn {
  position: relative;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  transition: color 0.2s;
}
.notif-btn:hover { color: var(--gold); }

.notif-count {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--gold);
  color: var(--black);
  font-size: 8px;
  font-weight: 700;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
}

/* ─── NOTIF PANEL ─── */
.notif-panel {
  position: fixed;
  top: 0;
  right: -380px;
  width: 380px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 400;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
}

.notif-panel.open { right: 0; }

.notif-panel-header {
  padding: 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.notif-panel-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.05em;
}

.notif-panel-body { flex: 1; overflow-y: auto; padding: 16px 24px; }

.notif-entry { padding: 14px 0; border-bottom: 1px solid var(--border); }
.notif-entry:last-child { border-bottom: none; }
.notif-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.notif-division { font-size: 9px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; }
.notif-time { font-size: 9px; color: var(--text-muted); }
.notif-type { font-size: 10px; color: var(--text); letter-spacing: 0.1em; margin-bottom: 3px; }
.notif-desc { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

/* ─── REQUEST LOG ─── */
.request-log { margin-top: 24px; }
.request-log-title { font-size: 10px; letter-spacing: 0.25em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px; }

.request-entry {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.request-entry:last-child { border-bottom: none; }
.request-entry-header { display: flex; align-items: center; justify-content: space-between; }
.request-entry-type { font-size: 10px; color: var(--text); letter-spacing: 0.1em; }
.request-entry-time { font-size: 9px; color: var(--text-muted); }
.request-entry-desc { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

/* ─── TAGS ─── */
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.tag {
  padding: 5px 14px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  background: var(--gold-glow);
}

/* ─── DIVISION HEALTH GRID ─── */
.division-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }

.division-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

.division-card:hover { border-color: var(--border-gold); background: var(--card-hover); }

.division-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.division-card-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--text); }
.division-card-status-dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-active { background: #4aaa70; }
.dot-pending { background: #c8a050; }
.dot-development { background: var(--text-muted); }
.division-card-nick { font-size: 9px; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
.division-card-note { font-size: 10px; color: var(--text-muted); line-height: 1.4; }

/* ─── INTEGRATION CARDS ─── */
.integration-row { display: flex; gap: 12px; margin-top: 20px; }
.integration-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 14px 18px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}
.integration-card strong { color: var(--gold); display: block; margin-bottom: 3px; font-size: 10px; letter-spacing: 0.15em; }

/* ─── CLERK OVERRIDES ─── */
.cl-rootBox { font-family: 'DM Mono', monospace !important; }
.cl-avatarBox { border-radius: 0 !important; border: 1px solid var(--border-gold) !important; }
.cl-userButtonPopoverCard { background: var(--surface) !important; border: 1px solid var(--border-gold) !important; border-radius: 0 !important; }
.cl-userButtonPopoverActionButton { color: var(--text-dim) !important; border-radius: 0 !important; }
.cl-userButtonPopoverActionButton:hover { background: var(--gold-glow) !important; color: var(--gold) !important; }
.cl-userButtonPopoverActionButtonText { font-family: 'DM Mono', monospace !important; font-size: 11px !important; }
.cl-internal-button { border-radius: 0 !important; }

<script>
// ════════════════════════════════════════════
// CLERK — SESSION GUARD
// Redirects to online.lvo-cloud.cloud if not signed in
// ════════════════════════════════════════════
const LOGIN_URL = 'https://online.lvo-cloud.cloud';

const clerkAppearance = {
  variables: {
    colorBackground: '#0a0a0a',
    colorText: '#e8e6e0',
    colorPrimary: '#b8953f',
    colorInputBackground: '#161616',
    colorInputText: '#e8e6e0',
    borderRadius: '0px',
    fontFamily: "'DM Mono', monospace",
    fontSize: '13px'
  },
  elements: {
    avatarBox: { borderRadius: '0', border: '1px solid #b8953f44' },
    userButtonPopoverCard: { background: '#111111', border: '1px solid #b8953f44', borderRadius: '0' },
    userButtonPopoverActionButton: { borderRadius: '0' }
  }
};

window.addEventListener('load', async () => {
  const guardScreen  = document.getElementById('guard-screen');
  const guardHint    = document.getElementById('guard-hint');
  const appEl        = document.getElementById('app');
  const sidebarName  = document.getElementById('sidebar-user-name');

  try {
    await Clerk.load({
      allowedRedirectOrigins: [
        'https://online.lvo-cloud.cloud',
        'https://dash.lvo-cloud.cloud'
      ]
    });
  } catch (e) {
    guardHint.textContent = 'Auth service unavailable.';
    guardHint.style.color = '#e05555';
    console.error('Clerk load error:', e);
    return;
  }

  function bootToLogin() {
    guardHint.textContent = 'No session found — redirecting...';
    setTimeout(() => { window.location.href = LOGIN_URL; }, 800);
  }

  function showDashboard(user) {
    // Display name
    const displayName = user.firstName
      ? user.firstName + (user.lastName ? ' ' + user.lastName[0] + '.' : '')
      : (user.primaryEmailAddress?.emailAddress || 'Authenticated');
    sidebarName.textContent = displayName;

    // Mount Clerk UserButton in two spots
    Clerk.mountUserButton(document.getElementById('clerk-topbar-btn'), { appearance: clerkAppearance });
    Clerk.mountUserButton(document.getElementById('clerk-user-btn'), { appearance: clerkAppearance });

    // Fade guard screen out
    guardScreen.classList.add('fade-out');
    setTimeout(() => {
      guardScreen.style.display = 'none';
      appEl.classList.add('visible');
      if (!window._appInited) { window._appInited = true; initApp(); }
    }, 500);
  }

  // Check initial session
  if (Clerk.user) {
    showDashboard(Clerk.user);
  } else {
    bootToLogin();
    return;
  }

  // Listen for sign-out → redirect to login
  Clerk.addListener(({ user }) => {
    if (!user) { bootToLogin(); }
  });
});

// ════════════════════════════════════════════
// DASHBOARD STATE & LOGIC
// ════════════════════════════════════════════
let allRequests = [];
let notifOpen = false;

const divisions = [
  { id: 'overview',    label: 'Overview',             sub: '',               icon: 'grid'      },
  { id: 'vindex',      label: 'Vindex',               sub: 'The Gasoline',   icon: 'database'  },
  { id: 'operations',  label: 'Operations',           sub: 'The Engine',     icon: 'settings'  },
  { id: 'alliance',    label: 'Alliance',             sub: 'The Brain',      icon: 'users'     },
  { id: 'obscura',     label: 'Obscura',              sub: 'The Base',       icon: 'monitor'   },
  { id: 'capital',     label: 'Capital',              sub: 'The Reservoir',  icon: 'briefcase' },
  { id: 'custodia',    label: 'Custodia',             sub: 'The Guard',      icon: 'shield'    },
  { id: 'outreach',    label: 'Outreach',             sub: 'The Heart',      icon: 'heart'     },
  { id: 'alatus',      label: 'Alatus',               sub: 'The Wing',       icon: 'wind'      },
  { id: 'pedes',       label: 'Pedes',                sub: 'The Legs',       icon: 'truck'     },
  { id: 'petra',       label: 'Petra',                sub: 'The Bedrock',    icon: 'triangle'  },
];

const icons = {
  grid:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  database:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
  settings:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  users:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  monitor:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>`,
  briefcase: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`,
  shield:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  heart:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  wind:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>`,
  truck:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  triangle:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>`,
};

function initApp() {
  buildSidebar();
  buildAllPages();
  navigate('overview');
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = divisions.map(d => `
    <div class="nav-item" id="nav-${d.id}" onclick="navigate('${d.id}')">
      <div class="nav-icon">${icons[d.icon]}</div>
      <div>
        <div class="nav-label">${d.label}</div>
        ${d.sub ? `<div class="nav-sub">${d.sub}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function navigate(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  const pageEl = document.getElementById('page-' + id);
  if (navEl) navEl.classList.add('active');
  if (pageEl) pageEl.classList.add('active');
  const d = divisions.find(x => x.id === id);
  document.getElementById('top-bar-label').textContent = d ? (d.label + (d.sub ? ' — ' + d.sub : '')) : 'LVO';
  if (id === 'capital') setTimeout(drawCapitalChart, 150);
}

// ─── REQUEST SYSTEM ───
function submitRequest(division, type, desc) {
  if (!type || !desc) return;
  const ts = new Date();
  const req = { division, type, desc, time: ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), date: ts.toLocaleDateString(), status: 'Submitted' };
  allRequests.unshift(req);
  updateNotifCount();
  updateNotifPanel();
  appendToRequestLog(division, req);
}

function updateNotifCount() {
  document.getElementById('notif-count').textContent = allRequests.length;
}

function updateNotifPanel() {
  const body = document.getElementById('notif-panel-body');
  if (allRequests.length === 0) {
    body.innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding-top:20px;text-align:center;">No requests yet.</div>';
    return;
  }
  body.innerHTML = allRequests.map(r => `
    <div class="notif-entry">
      <div class="notif-entry-header">
        <span class="notif-division">${r.division}</span>
        <span class="notif-time">${r.time}</span>
      </div>
      <div class="notif-type">${r.type}</div>
      <div class="notif-desc">${r.desc}</div>
    </div>
  `).join('');
}

function appendToRequestLog(divisionId, req) {
  const divObj = divisions.find(d => d.label === divisionId || d.id === divisionId);
  const logId = divObj ? 'reqlog-' + divObj.id : null;
  const log = logId ? document.getElementById(logId) : null;
  if (!log) return;
  const empty = log.querySelector('.req-empty');
  if (empty) empty.remove();
  const entry = document.createElement('div');
  entry.className = 'request-entry';
  entry.innerHTML = `
    <div class="request-entry-header">
      <span class="request-entry-type">${req.type}</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="badge badge-submitted">Submitted</span>
        <span class="request-entry-time">${req.time}</span>
      </div>
    </div>
    <div class="request-entry-desc">${req.desc}</div>
  `;
  log.appendChild(entry);
}

function toggleNotifPanel() {
  notifOpen = !notifOpen;
  document.getElementById('notif-panel').classList.toggle('open', notifOpen);
}

// ─── MODAL ───
function openModal(title, bodyHTML, footerHTML) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function requestBar(divId, types) {
  return `
    <div class="request-bar">
      <select id="rtype-${divId}">${types.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
      <input type="text" id="rdesc-${divId}" placeholder="Describe your request...">
      <button class="btn btn-gold" onclick="doRequest('${divId}')">Submit</button>
    </div>
  `;
}

function doRequest(divId) {
  const type = document.getElementById('rtype-' + divId)?.value;
  const desc = document.getElementById('rdesc-' + divId)?.value?.trim();
  if (!desc) { document.getElementById('rdesc-' + divId).style.borderBottomColor = 'var(--red-light)'; return; }
  document.getElementById('rdesc-' + divId).style.borderBottomColor = '';
  const div = divisions.find(d => d.id === divId);
  submitRequest(div ? div.label : divId, type, desc);
  document.getElementById('rdesc-' + divId).value = '';
  showToast('Request submitted to ' + (div ? div.label : divId));
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:32px;right:32px;background:var(--card);border:1px solid var(--border-gold);color:var(--text);font-family:"DM Mono",monospace;font-size:11px;letter-spacing:0.1em;padding:14px 20px;z-index:9000;animation:fadeIn 0.3s ease;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function reqLog(divId) {
  return `<div class="request-log"><div class="request-log-title">Submitted Requests</div><div id="reqlog-${divId}"><div class="req-empty" style="font-size:11px;color:var(--text-muted);padding:12px 0;">No requests yet.</div></div></div>`;
}

function badge(status) {
  const map = { 'Active':'active','Pending':'pending','Development':'development','Complete':'complete','Completed':'completed','Blocked':'blocked','Alert':'alert','Secured':'secured','Overdue':'overdue','Sold':'pending','In Development':'development','Submitted':'submitted','In Review':'review' };
  return `<span class="badge badge-${map[status]||'pending'}">${status}</span>`;
}

function tierBadge(tier) {
  return `<span class="badge badge-${tier.toLowerCase()}">${tier}</span>`;
}

function updateRowStatus(sel, tdIndex) {
  sel.closest('tr').querySelectorAll('td')[tdIndex].innerHTML = badge(sel.value);
}

function switchTab(el, targetId, groupId) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.closest('.page, .section').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(targetId).classList.add('active');
}

function openEmpireRequest() {

function drawCapitalChart() {
  const canvas = document.getElementById('capital-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = 160 * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const w = canvas.offsetWidth, h = 160;
  const data = [0.4,0.8,1.2,1.5,1.8,2.2,2.4,2.6,2.5,2.8,3.0,3.2];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad = {l:40,r:20,t:20,b:30};
  const cw = w-pad.l-pad.r, ch = h-pad.t-pad.b;
  const max = 3.5;
  const pts = data.map((v,i)=>({x:pad.l+(i/(data.length-1))*cw,y:pad.t+ch-(v/max)*ch}));
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  [0,1,2,3,4].forEach(i=>{
    const y=pad.t+(i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    ctx.fillStyle='#5a5650'; ctx.font='9px "DM Mono"';
    ctx.fillText('$'+(3.5-i*0.875).toFixed(1)+'M',0,y+3);
  });
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,'#b8953f22'); grad.addColorStop(1,'#b8953f00');
  ctx.beginPath(); ctx.moveTo(pts[0].x,pad.t+ch);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,pad.t+ch);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle='#b8953f'; ctx.lineWidth=1.5;
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.stroke();
  pts.forEach((p,i)=>{
    ctx.fillStyle='#9a9690'; ctx.font='8px "DM Mono"';
    ctx.fillText(months[i],p.x-8,h-8);
  });
}

    <div class="page-title"><span class="page-title-main">Alatus</span><span class="page-title-tag">The Wing</span></div>
    <div class="page-dba">Legion V. Omni-Operation – Alatus | LVOOA / LVO-OA</div>
    <div class="page-desc">Private aviation, drones, and aerospace logistics. Air superiority for the empire.</div>
  </div>
  ${requestBar('alatus',['Charter Flight Request','Drone Deployment','Surveillance Mission','Cargo Run','Maintenance Grounding'])}
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Charter Flights Completed</div><div class="kpi-value">42</div></div>
    <div class="kpi-card"><div class="kpi-label">Active Drone Units</div><div class="kpi-value" id="al-drone-count">4</div></div>
    <div class="kpi-card"><div class="kpi-label">Territories Covered</div><div class="kpi-value">9</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab(this,'altab-fly','alatus-tabs')">Aviation</div>
    <div class="tab" onclick="switchTab(this,'altab-drone','alatus-tabs')">Drone Systems</div>
  </div>
  <div id="alatus-tabs">
    <div class="tab-content active" id="altab-fly">
      <div class="section">
        <div class="section-header">
          <div class="section-title">Flight Log</div>
          <button class="btn btn-gold btn-sm" onclick="openScheduleFlight()">+ Schedule Flight</button>
        </div>
        <table class="data-table" id="alatus-flight-table">
          <thead><tr><th>Origin</th><th>Destination</th><th>Aircraft</th><th>Date</th><th>Status</th></tr></thead>
          <tbody>${flights.map(f=>`<tr><td class="gold-link">${f.origin}</td><td>${f.dest}</td><td>${f.aircraft}</td><td>${f.date}</td><td>${badge(f.status)}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="tab-content" id="altab-drone">
      <div class="section">
        <div class="section-header">
          <div class="section-title">Drone Units</div>
          <button class="btn btn-gold btn-sm" onclick="openDeployDrone()">+ Deploy Drone</button>
        </div>
        <table class="data-table" id="alatus-drone-table">
          <thead><tr><th>Unit</th><th>Mission Type</th><th>Assigned To</th><th>Status</th></tr></thead>
          <tbody>${drones.map(d=>`<tr><td class="gold-link">${d.unit}</td><td>${d.type}</td><td>${d.assigned}</td><td>${badge(d.status)}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  </div>
  ${reqLog('alatus')}
  </div>`;
}

function openScheduleFlight() {
  openModal('Schedule Flight',
    `<div class="form-row">
      <div class="form-group"><label class="form-label">Origin</label><input class="form-input" id="fl-orig" placeholder="City..."></div>
      <div class="form-group"><label class="form-label">Destination</label><input class="form-input" id="fl-dest" placeholder="City..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Aircraft</label>
      <select class="form-select" id="fl-aircraft"><option>Citation CJ4</option><option>King Air 350</option><option>Charter TBD</option></select></div>
      <div class="form-group"><label class="form-label">Date</label>
      <input class="form-input" id="fl-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
     <button class="btn btn-gold" onclick="addFlight()">Add to Flight Log</button>`
  );
}

function addFlight() {
  const orig     = document.getElementById('fl-orig').value.trim();
  const dest     = document.getElementById('fl-dest').value.trim();
  const aircraft = document.getElementById('fl-aircraft').value;
  const date     = document.getElementById('fl-date').value;
  if (!orig || !dest) return;
  const tbody = document.querySelector('#alatus-flight-table tbody');
  const tr = document.createElement('tr');
  const fmt = new Date(date).toLocaleDateString('en-US',{month:'short',day:'2-digit'});
  tr.innerHTML = `<td class="gold-link">${orig}</td><td>${dest}</td><td>${aircraft}</td><td>${fmt}</td><td>${badge('Pending')}</td>`;
  tbody.appendChild(tr);
  closeModal(); showToast('Flight scheduled: ' + orig + ' → ' + dest);
}

function openDeployDrone() {
  openModal('Deploy Drone',
    `<div class="form-row">
      <div class="form-group"><label class="form-label">Unit</label>
      <select class="form-select" id="dr-unit"><option>D-01</option><option>D-02</option><option>D-03</option><option>D-04</option><option>D-05 (new)</option></select></div>
      <div class="form-group"><label class="form-label">Mission Type</label>
      <select class="form-select" id="dr-type"><option>Surveillance</option><option>Delivery</option><option>Mapping</option><option>Perimeter</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Assigned Property</label>
      <select class="form-select" id="dr-prop"><option>A1 — Haven House</option><option>A2 — Cedar Point</option><option>A3 — Commercial Hub</option><option>A6 — Northgate</option><option>Operations HQ</option></select></div>
      <div class="form-group"><label class="form-label">Duration (hrs)</label>
      <input class="form-input" id="dr-dur" placeholder="4" type="number"></div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
     <button class="btn btn-gold" onclick="deployDrone()">Deploy</button>`
  );
}

function deployDrone() {
  const unit = document.getElementById('dr-unit').value;
  const type = document.getElementById('dr-type').value;
  const prop = document.getElementById('dr-prop').value;
  const tbody = document.querySelector('#alatus-drone-table tbody');
  const tr = document.createElement('tr');
  tr.innerHTML = `<td class="gold-link">${unit}</td><td>${type}</td><td>${prop}</td><td>${badge('Active')}</td>`;
  tbody.appendChild(tr);
  document.getElementById('al-drone-count').textContent = parseInt(document.getElementById('al-drone-count').textContent) + 1;
  closeModal(); showToast(unit + ' deployed to ' + prop);
}

// ─── PEDES ───
let pedesRuns = [
  {veh:'B1 — Escalade',driver:'M. Reyes',route:'Executive — Houston Loop',status:'Active'},
  {veh:'B3 — Sprinter',driver:'D. Cole',route:'Heavy — Katy → Spring',status:'Active'},
  {veh:'B2 — Transit',driver:'Unassigned',route:'Standby',status:'Pending'},
  {veh:'B6 — Sienna',driver:'L. Vance',route:'Final-mile — Cypress',status:'Active'},
  {veh:'B5 — Yukon',driver:'A. Bauer',route:'Executive — Spring',status:'Active'},
];
let runsCompleted = 218;

function buildPedes() {
  return `<div class="page" id="page-pedes">
  <div class="page-header">
    <div class="page-title"><span class="page-title-main">Pedes</span><span class="page-title-tag">The Legs</span></div>
    <div class="page-dba">Legion V. Omni-Operation – Pedes | LVOOP / LVO-OP</div>
    <div class="page-desc">Executive ground transport and heavy land logistics. Final-mile movement for every division.</div>
  </div>
  ${requestBar('pedes',['Executive Transport Request','Heavy Logistics Run','Driver Assignment','Vehicle Maintenance','Route Change'])}
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Active Vehicles</div><div class="kpi-value">4</div></div>
    <div class="kpi-card"><div class="kpi-label">Executive Runs Completed</div><div class="kpi-value" id="pedes-runs">218</div></div>
    <div class="kpi-card"><div class="kpi-label">Divisions Served</div><div class="kpi-value">6</div></div>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title">Fleet Operations</div>
      <button class="btn btn-gold btn-sm" onclick="openNewRun()">+ New Run</button>
    </div>
    <table class="data-table" id="pedes-table">
      <thead><tr><th>Vehicle</th><th>Driver</th><th>Current Route</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>${pedesRuns.map((r,i)=>`<tr><td class="gold-link">${r.veh}</td><td>${r.driver}</td><td>${r.route}</td><td id="pedes-status-${i}">${badge(r.status)}</td><td>${r.status==='Active'?`<button class="btn btn-outline btn-sm" onclick="completeRun(${i})">Complete</button>`:'—'}</td></tr>`).join('')}</tbody>
    </table>
  </div>
  <div class="integration-row">
    <div class="integration-card"><strong>Vindex — B-Series</strong>Vehicle ownership and asset tracking</div>
    <div class="integration-card"><strong>Custodia — Guard</strong>Driver security and route oversight</div>
  </div>
  ${reqLog('pedes')}
  </div>`;
}

function completeRun(i) {
  document.getElementById('pedes-status-' + i).innerHTML = badge('Complete');
  document.querySelector('#pedes-table tbody tr:nth-child(' + (i+1) + ')').querySelectorAll('td')[4].innerHTML = '—';
  runsCompleted++;
  document.getElementById('pedes-runs').textContent = runsCompleted;
  showToast('Run marked complete');
}

function openNewRun() {
  openModal('New Transport Run',
    `<div class="form-row">
      <div class="form-group"><label class="form-label">Vehicle</label>
      <select class="form-select" id="nr-veh"><option>B1 — Escalade</option><option>B2 — Transit</option><option>B3 — Sprinter</option><option>B5 — Yukon</option><option>B6 — Sienna</option></select></div>
      <div class="form-group"><label class="form-label">Driver</label><input class="form-input" id="nr-driver" placeholder="Last, First..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Route</label><input class="form-input" id="nr-route" placeholder="Origin → Destination"></div>
      <div class="form-group"><label class="form-label">Priority</label>
      <select class="form-select" id="nr-pri"><option>Standard</option><option>Priority</option><option>Emergency</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">Requesting Division</label>
    <select class="form-select" id="nr-div">${divisions.filter(d=>d.id!=='overview').map(d=>`<option>${d.label}</option>`).join('')}</select></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
     <button class="btn btn-gold" onclick="addRun()">Add Run</button>`
  );
}

function addRun() {
  const veh    = document.getElementById('nr-veh').value;
  const driver = document.getElementById('nr-driver').value.trim() || 'Unassigned';
  const route  = document.getElementById('nr-route').value.trim() || 'TBD';
  const tbody  = document.querySelector('#pedes-table tbody');
  const i = tbody.children.length;
  const tr = document.createElement('tr');
  tr.innerHTML = `<td class="gold-link">${veh}</td><td>${driver}</td><td>${route}</td><td id="pedes-status-${i}">${badge('Active')}</td><td><button class="btn btn-outline btn-sm" onclick="completeRun(${i})">Complete</button></td>`;
  tbody.appendChild(tr);
  closeModal(); showToast('Run added — ' + veh);
}

// ─── PETRA ───
let builds = [
  {name:'GRO-11 Sterling',type:'GRO Facility',div:'Operations',start:'Jan 2025',pct:62,status:'Active'},
  {name:'Cypress Commercial Hub',type:'Commercial',div:'Vindex',start:'Mar 2025',pct:40,status:'Active'},
  {name:'Haven House Renovation',type:'Renovation',div:'Operations',start:'Feb 2025',pct:85,status:'Active'},
  {name:'Northgate Expansion',type:'Commercial',div:'Vindex',start:'Apr 2025',pct:15,status:'Pending'},
  {name:'GRO-13 Brookline',type:'GRO Facility',div:'Operations',start:'Nov 2024',pct:100,status:'Completed'},
];

function buildPetra() {
  return `<div class="page" id="page-petra">
  <div class="page-header">
    <div class="page-title"><span class="page-title-main">Petra</span><span class="page-title-tag">The Bedrock</span></div>
    <div class="page-dba">Legion V. Omni-Operation – Petra | LVOPR / LVO-OPR</div>
    <div class="page-desc">Physical construction and infrastructure. Builds GRO facilities for Operations and commercial hubs for Vindex.</div>
  </div>
  ${requestBar('petra',['New Build Request','Renovation Request','Inspection Request','Material Order','Project Update'])}
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Active Projects</div><div class="kpi-value" id="petra-active">4</div></div>
    <div class="kpi-card"><div class="kpi-label">Projects Completed</div><div class="kpi-value">9</div></div>
    <div class="kpi-card"><div class="kpi-label">Divisions Served</div><div class="kpi-value">2</div><div class="kpi-sub">Operations · Vindex</div></div>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title">Active Builds</div>
      <button class="btn btn-gold btn-sm" onclick="openNewBuild()">+ New Build</button>
    </div>
    <table class="data-table" id="petra-table">
      <thead><tr><th>Project</th><th>Type</th><th>Division</th><th>Start</th><th>Completion</th><th>Status</th><th>Update %</th></tr></thead>
      <tbody>${builds.map((b,i)=>`<tr>
        <td class="gold-link">${b.name}</td>
        <td>${b.type}</td>
        <td>${b.div}</td>
        <td>${b.start}</td>
        <td><div class="progress-wrap"><div class="progress-bar" style="width:80px"><div class="progress-fill" id="petra-fill-${i}" style="width:${b.pct}%"></div></div><span class="progress-label" id="petra-pct-${i}">${b.pct}%</span></div></td>
        <td id="petra-status-${i}">${badge(b.status)}</td>
        <td><input type="number" class="form-input" style="width:60px;padding:4px 6px;" min="0" max="100" value="${b.pct}" onchange="updateProgress(${i},this.value)"></td>
      </tr>`).join('')}</tbody>
    </table>
  </div>
  ${reqLog('petra')}
  </div>`;
}

function updateProgress(i, val) {
  val = Math.min(100, Math.max(0, parseInt(val)||0));
  document.getElementById('petra-fill-' + i).style.width = val + '%';
  document.getElementById('petra-pct-' + i).textContent = val + '%';
  if (val === 100) { document.getElementById('petra-status-' + i).innerHTML = badge('Completed'); showToast('Project marked complete'); }
}

function openNewBuild() {
  openModal('New Build Request',
    `<div class="form-row">
      <div class="form-group"><label class="form-label">Project Name</label><input class="form-input" id="nb-name" placeholder="Project name..."></div>
      <div class="form-group"><label class="form-label">Type</label>
      <select class="form-select" id="nb-type"><option>GRO Facility</option><option>Commercial</option><option>Renovation</option><option>Infrastructure</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Linked Division</label>
      <select class="form-select" id="nb-div"><option>Operations</option><option>Vindex</option><option>Capital</option></select></div>
      <div class="form-group"><label class="form-label">Est. Budget</label><input class="form-input" id="nb-budget" placeholder="$0K"></div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
     <button class="btn btn-gold" onclick="addBuild()">Add Build</button>`
  );
}

function addBuild() {
  const name = document.getElementById('nb-name').value.trim();
  const type = document.getElementById('nb-type').value;
  const div  = document.getElementById('nb-div').value;
  if (!name) return;
  const tbody = document.querySelector('#petra-table tbody');
  const i = tbody.children.length;
  const now = new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'});
  const tr = document.createElement('tr');
  tr.innerHTML = `<td class="gold-link">${name}</td><td>${type}</td><td>${div}</td><td>${now}</td>
    <td><div class="progress-wrap"><div class="progress-bar" style="width:80px"><div class="progress-fill" id="petra-fill-${i}" style="width:0%"></div></div><span class="progress-label" id="petra-pct-${i}">0%</span></div></td>
    <td id="petra-status-${i}">${badge('Active')}</td>
    <td><input type="number" class="form-input" style="width:60px;padding:4px 6px;" min="0" max="100" value="0" onchange="updateProgress(${i},this.value)"></td>`;
  tbody.appendChild(tr);
  document.getElementById('petra-active').textContent = parseInt(document.getElementById('petra-active').textContent) + 1;
  closeModal(); showToast(name + ' added to Active Builds');
}
</script>
</body>
